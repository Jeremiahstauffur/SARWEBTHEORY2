  <style>
    .more-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 15px;
      margin-top: 10px;
    }
    .more-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 16px;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid var(--line);
      border-radius: 16px;
      text-decoration: none;
      color: var(--text);
      transition: all 0.2s ease;
      text-align: center;
    }
    .more-item:active {
      background: rgba(125, 198, 255, 0.2);
      transform: scale(0.95);
    }
    .more-item svg {
      margin-bottom: 8px;
      width: 28px;
      height: 28px;
      stroke: var(--accent);
    }
    .more-item span {
      font-size: 0.85rem;
      font-weight: 500;
      color: var(--text);
    }
    @media (min-width: 401px) {
        .more-grid {
            grid-template-columns: repeat(3, 1fr);
        }
    }
  </style>
